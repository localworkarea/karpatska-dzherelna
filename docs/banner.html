<!doctype html>
<html lang="uk" class="">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preload" href="./assets/fonts/ProximaNova-Semibold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
		<link rel="preload" href="./assets/fonts/ProximaNova-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">
		<link rel="preload" href="./assets/fonts/ProximaNova-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
		<link rel="preload" href="./assets/fonts/Oswald-Medium.woff2" as="font" type="font/woff2" crossorigin="anonymous">
		<link rel="shortcut icon" href="./assets/img/favicon.ico">
		<title>Карпатська Джерельна | Банер</title>
		<script type="module" crossorigin="" src="./js/banner.min.js?v=1773435465509"></script>
		<link rel="modulepreload" crossorigin="" href="./js/main.min.js?v=1773435465509">
		<link rel="modulepreload" crossorigin="" href="./js/common.min.js?v=1773435465509">
		<link rel="stylesheet" crossorigin="" href="./css/main.min.css?v=1773435465509">
		<link rel="stylesheet" crossorigin="" href="./css/banner.min.css?v=1773435465509">
	</head>
	<body class="pace-done">
		<div class="wrapper">
			<main class="page page--banner">
				<div class="banner-big">
					<div class="banner-big__bg">
						<picture>
							<source media="(max-width: 500px)" srcset="./assets/img/bgs/bg-1-pc-500.webp" type="image/webp">
							<source media="(max-width: 1200px)" srcset="./assets/img/bgs/bg-1-pc-1200.webp" type="image/webp">
							<img class="ibg" width="1440" height="680" alt="Image" src="./assets/img/bgs/bg-1-pc.webp">
						</picture>
					</div>
					<div class="banner-big__main">
						<picture>
							<source media="(max-width: 500px)" srcset="./assets/img/bgs/bg-1-mb-3-500.webp" type="image/webp">
							<img class="banner-big__img-mb" width="634" height="474" alt="Image" src="./assets/img/bgs/bg-1-mb-3.webp">
						</picture>
						<picture>
							<source srcset="./assets/img/ban/ban-main.webp" media="(min-width: 51.311em)" type="image/webp">
							<source srcset="./assets/img/ban/ban-vert.webp" media="(max-width: 51.311em)" type="image/webp">
								<img class="banner-big__img ibg" width="1440" height="680" alt="image" src="./assets/img/ban/ban-main.webp">
							</picture>
						</picture>
						<a href="#" class="banner-big__btn" aria-label="link">
							<span>Детальніше</span>
						</a>
					</div>
				</div>
				<div class="banner-sm">
					<button type="button" class="banner-sm__close" aria-label="close modal">
						<img src="./assets/img/icons/cross.svg" width="12" height="12" alt="Image">
					</button>
					<a href="#" class="banner-sm__link" aria-label="link">
						<picture>
							<source media="(max-width: 500px)" srcset="./assets/img/ban/ban-sm-500.webp" type="image/webp">
							<source media="(max-width: 1200px)" srcset="./assets/img/ban/ban-sm-1200.webp" type="image/webp">
							<img width="408" height="216" alt="Image" src="./assets/img/ban/ban-sm.webp">
						</picture>
					</a>
				</div>
			</main>
		</div>
	</body>
</html>
